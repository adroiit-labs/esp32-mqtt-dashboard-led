<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 IoT Dashboard</title>
    <!-- Include CDN for Paho MQTT Client library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        header {
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            background-color: #334155;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .status-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: var(--text-muted);
        }

        .status-badge.connected {
            color: var(--accent-green);
            background-color: rgba(16, 185, 129, 0.1);
        }
        .status-badge.connected::before {
            background-color: var(--accent-green);
        }

        .status-badge.connecting {
            color: var(--accent-blue);
            background-color: rgba(59, 130, 246, 0.1);
        }
        .status-badge.connecting::before {
            background-color: var(--accent-blue);
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-bottom: 25px;
        }

        .control-label {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* Modern Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 80px;
            height: 44px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 44px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 36px;
            width: 36px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input:checked + .slider {
            background-color: var(--accent-green);
        }

        input:checked + .slider:before {
            transform: translateX(36px);
        }

        /* Console / Feed Panel */
        .feed-container {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #334155;
        }

        .feed-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .feed-log {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            height: 100px;
            overflow-y: auto;
            color: #38bdf8;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-entry {
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>ESP32 Control Dashboard</h1>
            <div id="broker-status" class="status-badge connecting">Connecting to Broker...</div>
        </header>

        <main>
            <div class="control-panel">
                <span class="control-label">LED Status Override</span>
                <label class="switch">
                    <input type="checkbox" id="ledToggle" onchange="toggleLED(this)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="feed-container">
                <div class="feed-title">ESP32 Device Status Feed</div>
                <div id="log" class="feed-log">
                    <div class="log-entry">> Initializing dashboard...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- HIVEMQ CONFIGURATION ---
        // Note: HiveMQ WebSockets over TLS requires Port 8884
        const MQTT_HOST = "20424e1b11d14b17a57190798e3f18bf.s1.eu.hivemq.cloud";
        const MQTT_PORT = 8884; 
        const MQTT_USER = "esp32_user";
        const MQTT_PASS = "Adroiit@234";
        
        const TOPIC_SUB = "home/led/status"; // Listen to confirmation from ESP32
        const TOPIC_PUB = "home/led";        // Send commands here

        let client;
        const statusBadge = document.getElementById("broker-status");
        const logContainer = document.getElementById("log");
        const toggleSwitch = document.getElementById("ledToggle");

        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement("div");
            entry.className = "log-entry";
            entry.innerText = `[${timestamp}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function initMQTT() {
            // Generate unique client ID for the browser instance
            const clientId = "web_client_" + Math.random().toString(16).substr(2, 8);
            client = new Paho.MQTT.Client(MQTT_HOST, Number(MQTT_PORT), clientId);

            // Hook Event handlers
            client.onConnectionLost = onConnectionLost;
            client.onMessageArrived = onMessageArrived;

            const options = {
                useSSL: true,
                userName: MQTT_USER,
                password: MQTT_PASS,
                onSuccess: onConnect,
                onFailure: onFailure
            };

            addLog("Connecting to HiveMQ Cloud via WebSockets...");
            client.connect(options);
        }

        function onConnect() {
            statusBadge.className = "status-badge connected";
            statusBadge.innerText = "Broker Connected";
            addLog("Connected! Subscribing to " + TOPIC_SUB);
            client.subscribe(TOPIC_SUB);
        }

        function onFailure(response) {
            statusBadge.className = "status-badge";
            statusBadge.innerText = "Connection Failed";
            addLog("Error: " + response.errorMessage);
            setTimeout(initMQTT, 5000); // Retry after 5s
        }

        function onConnectionLost(responseObject) {
            statusBadge.className = "status-badge";
            statusBadge.innerText = "Disconnected";
            addLog("Connection lost: " + responseObject.errorMessage);
            if (responseObject.errorCode !== 0) {
                setTimeout(initMQTT, 5000); // Auto reconnect
            }
        }

        // Fired when the ESP32 sends a status message back to home/led/status
        function onMessageArrived(message) {
            const payload = message.payloadString;
            addLog(`Received: "${payload}"`);

            // Sync UI toggle with actual physical state reported by ESP32
            if (payload === "LED is ON") {
                toggleSwitch.checked = true;
            } else if (payload === "LED is OFF") {
                toggleSwitch.checked = false;
            }
        }

        // Fired when user clicks the UI Toggle
        function toggleLED(checkbox) {
            if (!client || !client.isConnected()) {
                addLog("Cannot send command: Not connected to broker.");
                checkbox.checked = !checkbox.checked; // Revert switch UI
                return;
            }

            const command = checkbox.checked ? "ON" : "OFF";
            const message = new Paho.MQTT.Message(command);
            message.destinationName = TOPIC_PUB;
            client.send(message);
            addLog(`Sent command: ${command}`);
        }

        // Start connection sequence on window load
        window.onload = initMQTT;
    </script>
</body>
</html>
